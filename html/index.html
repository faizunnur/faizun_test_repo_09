<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>faizun_tst_09</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --bg-card: #16161f;
      --accent: #6c63ff;
      --accent-dim: #4c45b3;
      --text-primary: #f0f0f5;
      --text-secondary: #8888aa;
      --border: #2a2a3a;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .background-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108, 99, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(108, 99, 255, 0.1);
      border: 1px solid rgba(108, 99, 255, 0.3);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 100px;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .project-name {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #f0f0f5 0%, #8888aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .project-name span {
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
    }

    .description {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      max-width: 400px;
      line-height: 1.6;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-top: 1rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #7c74ff;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(108, 99, 255, 0.35);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
      transform: translateY(-1px);
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      color: var(--text-secondary);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    .footer span {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="background-glow"></div>

  <div class="container">
    <div class="badge">Project</div>

    <h1 class="project-name">
      faizun<span>_tst_09</span>
    </h1>

    <div class="divider"></div>

    <p class="description">
      A focused workspace for building, testing, and iterating on your next big idea.
    </p>

    <div class="card">
      <div class="stat">
        <div class="stat-value">09</div>
        <div class="stat-label">Version</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value">TST</div>
        <div class="stat-label">Stage</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value">Active</div>
        <div class="stat-label">Status</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary">Get Started</button>
      <button class="btn btn-secondary">Learn More</button>
    </div>
  </div>

  <div class="footer">Built for <span>faizun_tst_09</span></div>

</body>
</html>
