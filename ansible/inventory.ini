[web_servers]
nginx_server ansible_host=ec2-web-faizun-tst-09.compute.amazonaws.com ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/faizun_tst_09.pem

[web_servers:vars]
ansible_python_interpreter=/usr/bin/python3
project_name=faizun_tst_09
environment=production
nginx_port=80
nginx_ssl_port=443

[all:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
region=us-east-1